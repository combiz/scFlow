name: R GitHub Actions

on:
  push:
    branches:
      - master
      - nfancy-patch-1

jobs:
  R-CMD-check:
    name: R-CMD-check
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      RGL_USE_NULL: TRUE

    steps:
      - uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          install-r: false

      - name: Get R package version
        run: |
          version=$(grep Version DESCRIPTION | grep -o "[0-9.]\+")
          echo "packageVersion=${version}" >> $GITHUB_ENV

      # Login DOCKERHUB FIRST
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build once, push automatically
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          push: true
          file: ./Dockerfile
          tags: |
            nfancy/scflow:latest
            nfancy/scflow:${{ env.packageVersion }}
